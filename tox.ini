[tox]
env_list =
    static
    cov
    py311
    py312
    py313
    py314
isolated_build = true
skip_missing_interpreters = true

[testenv]
extras =
    dev
commands_pre =
    python -m pip install -U "pip>=26.1"
commands =
    pytest tests {posargs}

[testenv:static]
extras =
    dev
commands =
    bash {toxinidir}/scripts/check-no-bundled-schema.sh
    bash {toxinidir}/scripts/check-no-handwritten-model-types.sh
    bash {toxinidir}/scripts/verify-generated-types.sh
    ruff format --check {toxinidir}/src {toxinidir}/tests
    ruff check {toxinidir}/src {toxinidir}/tests
allowlist_externals = bash
setenv =
    INTENTPROOF_SPEC_ROOT = {env:INTENTPROOF_SPEC_ROOT:}

[testenv:cov]
description = pytest with 100% line coverage gate
extras =
    dev
commands =
    pytest tests --cov=intentproof --cov-report=term-missing --cov-fail-under=100 {posargs}

[testenv:audit]
description = CVE scan (pip-audit / PyPI advisory DB)
extras =
    dev
commands =
    pip-audit {posargs}

[testenv:spec]
description = Run canonical intentproof-spec Vitest oracle (Node.js + npm on PATH)
skip_install = true
deps =
allowlist_externals = bash
commands =
    bash {toxinidir}/scripts/spec-conformance.sh
