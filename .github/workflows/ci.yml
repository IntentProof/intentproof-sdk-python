name: CI

on:
  push:
    branches: [main, master]
    # Skip when only repo-root conformance JSON changes (artifact refresh commits).
    paths-ignore:
      - "conformance-certificate.json"
      - "conformance-report.json"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  no-handwritten-model-types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path
          c = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["tool"]["intentproof"]["spec-commit"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"sha={c}\n")
          PY

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - name: No handwritten model/types outside generated schema package
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: bash scripts/check-no-handwritten-model-types.sh

  hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path
          c = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["tool"]["intentproof"]["spec-commit"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"sha={c}\n")
          PY

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # was `@v6`
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: SDK hardening contract audit (spec-only + drift guards)
        run: bash intentproof-spec/scripts/check-consumer-hardening.sh "${{ github.workspace }}"

  spec-golden-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path
          c = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["tool"]["intentproof"]["spec-commit"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"sha={c}\n")
          PY

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: ./.github/actions/setup-python-pip
        with:
          python-version: "3.13"
          check-latest: false

      - name: Install project (dev extras)
        run: pip install -e ".[dev]"

      - name: Golden execution_event JSONL parity (schema + semantics)
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: pytest tests/unit/test_spec_golden_conformance.py -v

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`

      - uses: ./.github/actions/setup-python-pip
        with:
          python-version: "3.x"
          check-latest: true

      - name: Install project (dev extras)
        run: pip install -e ".[dev]"

      - name: pip-audit
        run: pip-audit

  tox:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tox-env: static
            python-version: "3.x"
            check-latest: true
          - tox-env: cov
            python-version: "3.x"
            check-latest: true
          - tox-env: py311
            python-version: "3.11"
            check-latest: false
          - tox-env: py312
            python-version: "3.12"
            check-latest: false
          - tox-env: py313
            python-version: "3.13"
            check-latest: false
          - tox-env: py314
            python-version: "3.14"
            check-latest: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path
          c = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["tool"]["intentproof"]["spec-commit"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"sha={c}\n")
          PY

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was `@v6`
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: ./.github/actions/setup-python-pip
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: ${{ matrix.check-latest }}

      - name: Install tox
        run: pip install "tox>=4"

      - name: Run tox
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: tox run -e ${{ matrix.tox-env }}
