name: release signing dry run

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: SemVer version to place in dry-run attestations.
        required: true
        default: 0.0.0-dryrun
        type: string
      release_ref:
        description: Git ref to check out for the dry run.
        required: true
        default: refs/heads/main
        type: string

jobs:
  build-python-dists:
    name: "IntentProof Release: Build Python Distributions"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      artifact_paths: ${{ steps.dists.outputs.artifact_paths }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.release_ref }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade build
          if [ -f pyproject.toml ]; then
            pip install -e .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install test dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest -q

      - name: Build Python distributions
        run: python -m build --outdir dist .

      - name: Export distribution paths
        id: dists
        run: |
          {
            echo 'artifact_paths<<EOF'
            find dist -maxdepth 1 -type f | sort
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-release-dry-run
          path: dist/*

  sign-python-dists:
    name: "IntentProof Release: Sign Python Distributions"
    needs: build-python-dists
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    uses: IntentProof/intentproof-tools/.github/workflows/release-build-sign.yml@e982df238d9f111bc1f59b7473988c0d538dabb6
    with:
      artifact_kind: generic
      subject_name: intentproof
      release_version: ${{ inputs.release_version }}
      release_ref: ${{ inputs.release_ref }}
      artifact_paths: ${{ needs.build-python-dists.outputs.artifact_paths }}
      artifact_download_name: python-release-dry-run
      artifact_download_path: dist
      attest_to_rekor: false
