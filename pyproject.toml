[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "intentproof-sdk-python"
version = "0.1.0"
description = "Python SDK for IntentProof"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
